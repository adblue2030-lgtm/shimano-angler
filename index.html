function useTackleStorage(key, fallback) {
  const [data, setData] = useState(fallback);
  const [loaded, setLoaded] = useState(false);
  useEffect(() => {
    try {
      const raw = localStorage.getItem(key);
      if (raw) setData(JSON.parse(raw));
    } catch (e) {
      console.error("読み込みに失敗しました", e);
    } finally {
      setLoaded(true);
    }
  }, [key]);
  const persist = useCallback(next => {
    setData(next);
    try {
      localStorage.setItem(key, JSON.stringify(next));
    } catch (e) {
      console.error("保存に失敗しました", e);
    }
  }, [key]);
  return [data, persist, loaded];
}
function downloadCsv(filename, rows) {
  const csv = rows.map(r => r.map(csvEscape).join(",")).join("\r\n");
  const blob = new Blob(["\uFEFF" + csv], {
    type: "text/csv;charset=utf-8;"
  });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

      return raw ? JSON.parse(raw) : { url: "", token: "" };
    } catch (e) {

  });
  const setConfig = (next) => {
    setConfigState(next);
    try { localStorage.setItem("tackle:config", JSON.stringify(next)); }
    catch (e) { console.error("設定の保存に失敗しました", e); }
  };
  return [config, setConfig];
}

async function callSheetApi(config, payload) {
  if (!config.url) throw new Error("連携先URLが設定されていません");
  const res = await fetch(config.url, {
    method: "POST",
    // Content-Type を text/plain にすることでApps Script側のCORSプリフライトを回避
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(Object.assign({}, payload, { token: config.token })),
  });
  if (!res.ok) throw new Error("通信エラー (HTTP " + res.status + ")");
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || "同期エラー");
  return json.data;
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result).split(",")[1]);
    reader.onerror = () => reject(reader.error);
    reader.readAsDataURL(file);
  });
}

async function uploadAttachment(config, file) {
  const dataBase64 = await fileToBase64(file);
  return callSheetApi(config, {
    action: "uploadFile",
    filename: file.name,
    mimeType: file.type || "application/octet-stream",
    dataBase64: dataBase64,
  });
}
